<!DOCTYPE html>
<html lang="he" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nexora Website</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{

background:linear-gradient(
180deg,
#050816,
#071026,
#0b1733
);

min-height:100vh;

display:flex;
justify-content:center;
align-items:center;

padding:20px;

color:white;

}

.container{

width:100%;
max-width:500px;

background:rgba(255,255,255,.03);

border:1px solid rgba(255,255,255,.08);

border-radius:30px;

padding:40px 25px;

backdrop-filter:blur(15px);

}

.logo{

font-size:72px;
font-weight:800;

text-align:center;

margin-bottom:20px;

}

.subtitle{

text-align:center;

font-size:24px;

color:#aab4d0;

margin-bottom:40px;

}

.card{

background:rgba(255,255,255,.04);

border:1px solid rgba(255,255,255,.06);

border-radius:24px;

padding:28px;

margin-bottom:18px;

}

.card h3{

font-size:34px;

margin-bottom:15px;

}

.card p{

font-size:22px;

color:#c8d1e8;

line-height:1.6;

}

.button{

display:block;

width:100%;

margin-top:30px;

padding:24px;

background:#2563eb;

color:white;

text-decoration:none;

text-align:center;

font-size:32px;

font-weight:700;

border-radius:20px;

}

</style>
</head>

<body>

<div class="container">

<div class="logo">
Nexora
</div>

<div class="subtitle">
⚖️ מערכת חכמה לעורכי דין
</div>

<div class="card">

<h3>🌐 אתר מקצועי</h3>

<p>
לקוחות יכולים להתחיל
את התהליך מכל מקום
</p>

</div>

<div class="card">

<h3>📄 טפסים חכמים</h3>

<p>
קליטת פניות ומסמכים
בצורה אוטומטית
</p>

</div>

<div class="card">

<h3>📁 איסוף מסמכים</h3>

<p>
העלאת קבצים ישירות
למערכת
</p>

</div>

<div class="card">

<h3>⚡ יצירת קשר מהירה</h3>

<p>
הלקוח שולח פנייה
ומתחיל תהליך מיד
</p>

</div>

<a href="#" class="button">

⚖️ קבלו ייעוץ משפטי

</a>

</div>

</body>
</html>
