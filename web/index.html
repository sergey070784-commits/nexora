<!DOCTYPE html>
<html lang="he">

<head>

<meta charset="UTF-8">

<meta name="viewport"

content="width=device-width, initial-scale=1.0">

<title>Nexora Demo</title>

<style>

body{

    margin:0;

    background:#0f172a;

    color:#ffffff;

    font-family:Arial,sans-serif;

    direction:rtl;

    display:flex;

    justify-content:center;

    align-items:center;

    min-height:100vh;
}

.container{

    width:95%;

    max-width:850px;

    background:#1e293b;

    border-radius:24px;

    padding:28px;

    box-sizing:border-box;
}

h1{

    text-align:center;

    margin:0 0 24px 0;

    font-size:32px;

    font-weight:bold;
}

.message{

    font-size:18px;

    line-height:1.8;

    text-align:center;

    margin-bottom:24px;
}

.input-box{

    width:100%;

    height:42px;

    padding:12px 16px;

    margin-bottom:18px;

    border:none;

    border-radius:16px;

    box-sizing:border-box;

    background:#0f172a;

    color:#ffffff;

    font-size:18px;
}
.input-wrapper{

    display:flex;

    align-items:center;

    gap:8px;

    margin-bottom:18px;

}

.input-box{

    flex:1;

    height:42px;

    padding:12px 16px;

    border:none;

    border-radius:16px;

    box-sizing:border-box;

    background:#0f172a;

    color:#ffffff;

    font-size:18px;

}

.send-button{

    width:42px;

    height:42px;

    border:none;

    border-radius:50%;

    background:#2563eb;

    color:white;

    font-size:18px;

    cursor:pointer;

    flex-shrink:0;

}
.button{

    width:100%;

    height:38px;

    margin-top:8px;

    border:none;

    border-radius:16px;

    background:#475569;

    color:#ffffff;

    font-size:16px;

    font-weight:bold;

    text-align:center;

    cursor:pointer;
}

.menu-button{

    width:100%;

    height:38px;

    margin-top:8px;

    border:none;

    border-radius:16px;

    background:#64748b;

    color:#ffffff;

    font-size:16px;

    font-weight:bold;

    cursor:pointer;
}

</style>

</head>

<body>

<div class="container">

<h1 id="title"></h1>

<div id="messages"></div>

<div id="aboutModal"
     style="
     display:none;
     position:fixed;
     top:0;
     left:0;
     width:100%;
     height:100%;
     background:#07152f;
     z-index:9999;
     overflow:auto;
     padding:20px;
     box-sizing:border-box;
">

    <div
        style="
        max-width:700px;
        margin:auto;
        text-align:center;
        color:white;
    ">
<img
    id="aboutImage"
    style="
    width:100%;
    max-height:44vh;
    object-fit:cover;
    border-radius:20px;
    margin-bottom:12px;
">

<h1
    id="aboutTitle"
    style="
    margin:10px 0;
    font-size:28px;
"
></h1>

<div
    id="aboutText"
    style="
    font-size:18px;
    line-height:1.5;
    margin-top:10px;
"
></div>
<div
    id="aboutButtons"
    style="
        margin-top:20px;
        display:flex;
        flex-direction:column;
        gap:10px;
    "
></div>

</div>
</div>

<div class="input-wrapper">

    <input
        id="chatInput"
        class="input-box"
        type="text"
        placeholder="הקלידו  אם יש לכם שאלה"
    >

    <button
        id="sendButton"
        class="send-button"
    >
        ➤
    </button>

</div>
<div id="buttons"></div>
</div>
<script>

let entryPoints = {};

let routes = {};

let pages = {};

let popupRoutes = {};


async function getPage(key){

    let pageId =
        entryPoints[key];

    if(!pageId){

        pageId =
            routes[key];

    }

    if(!pageId){

        return null;

    }

    const pageFile =
        pages[pageId];

    if(!pageFile){

        return null;

    }

    const response =
        await fetch(
            BASE + "pages/" + pageFile
        );

    return await response.json();

}

async function loadNavigation(){

    entryPoints =
        await fetch(
            BASE + "navigation/entry_points.json"
        ).then(r => r.json());

    routes =
        await fetch(
            BASE + "navigation/routes.json"
        ).then(r => r.json());

    pages =
        await fetch(
            BASE + "navigation/pages.json"
        ).then(r => r.json());

    popupRoutes =
        await fetch(
            BASE + "navigation/popup_routes.json"
        ).then(r => r.json());

}

async function getPopup(key){

    const popupId =
        popupRoutes[key];

    if(!popupId){

        return null;

    }

    const popupFile =
        pages[popupId];

    if(!popupFile){

        return null;

    }

    const response =
        await fetch(
            BASE + "pages/" + popupFile
        );

    return await response.json();

}
async function showPage(key){

    const data =
        await getPage(key);

    if(!data){

        console.error(
            "Page not found:",
            key
        );

        return;

    }

    renderPage(data);

}
function showPopup(data){

    document.getElementById(
        "aboutImage"
    ).src =
        data.image || "";

    document.getElementById(
        "aboutTitle"
    ).innerText =
        data.title || "";

    document.getElementById(
        "aboutText"
    ).innerHTML =
        (data.messages || []).join("<br><br>");

    const aboutButtons =
        document.getElementById(
            "aboutButtons"
        );

    aboutButtons.innerHTML = "";

    (data.buttons || []).forEach(btn => {

        const button =
            document.createElement(
                "button"
            );

        button.className =
            "button";

        button.innerText =
            btn.text;

        button.onclick = async () => {

            document.getElementById(
                "aboutModal"
            ).style.display =
                "none";

            const popup =
                await getPopup(btn.id);

            if(popup){

                showPopup(popup);

                return;

            }

            await showPage(btn.id);

        };

        aboutButtons.appendChild(
            button
        );

    });

    document.getElementById(
        "aboutModal"
    ).style.display =
        "block";

}

function renderPage(data){

    document.getElementById(
        "title"
    ).innerText =
        data.title;

    const messages =
        document.getElementById(
            "messages"
        );

    messages.innerHTML = "";

    data.messages.forEach(msg => {

        const div =
            document.createElement(
                "div"
            );

        div.className =
            "message";

        div.innerText =
            msg;

        messages.appendChild(
            div
        );

    });

    const buttons =
        document.getElementById(
            "buttons"
        );

    buttons.innerHTML = "";

    data.buttons.forEach(btn => {

        const button =
            document.createElement(
                "button"
            );

        button.className =
            "button";

        button.innerText =
            btn.text;

        button.onclick = async () => {

            const popup =
                await getPopup(btn.id);

            if(popup){

                showPopup(popup);

                return;

            }

            await showPage(btn.id);

        };

        buttons.appendChild(
            button
        );

    });
}
const BASE =
    "https://raw.githubusercontent.com/sergey070784-commits/nexora/main/";

const input =
    document.getElementById("chatInput");

const sendButton =
    document.getElementById("sendButton");

async function sendMessage(){

    const text =
        input.value.trim();

    if(!text)
        return;

    try{

        const response =
            await fetch(
                "https://message.sergey070784.workers.dev/",
                {

                    method:"POST",

                    headers:{
                        "Content-Type":"application/json"
                    },

                    body:JSON.stringify({

                        session_id:
                            localStorage.getItem("session_id"),

                        channel:
                            "web",

                        message:
                            text

                    })

                }
            );

        if(!response.ok){

            throw new Error("Send failed");

        }

        input.value = "";

    }

    catch(err){

        console.error(err);

    }

}

sendButton.onclick =
    sendMessage;

input.addEventListener(
    "keydown",
    e => {

        if(e.key === "Enter")
            sendMessage();

    }
);

(async () => {

    await loadNavigation();

    const params =
        new URLSearchParams(
            window.location.search
        );

    const start =
        params.get("start") || "nx_menu";

    await showPage(start);

})();

</script>
</body>

</html>
