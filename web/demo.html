<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nexora</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html{
    scroll-behavior:smooth;
}

body{
    background:#0d0d12;
    color:#fff;
    font-family:Arial,sans-serif;
}

/* HEADER */

.header{
    position:fixed;
    top:0;
    right:0;
    width:100%;
    height:60px;
    background:rgba(13,13,18,.95);
    backdrop-filter:blur(10px);
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:0 20px;
    z-index:1000;
    border-bottom:1px solid #222;
}

.logo{
    font-size:28px;
    font-weight:bold;
    color:#c48cff;
}

.menu-btn{
    background:none;
    border:none;
    color:white;
    font-size:28px;
    cursor:pointer;
}

/* DRAWER */

.drawer{
    position:fixed;
    top:0;
    right:-300px;
    width:280px;
    height:100%;
    background:#16161f;
    transition:.3s;
    z-index:1100;
    padding:90px 25px;
}
.overlay{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.55);
    opacity:0;
    visibility:hidden;
    transition:.3s;
    z-index:1050;
}

.overlay.show{
    opacity:1;
    visibility:visible;
}

.drawer-header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:30px;
}

.drawer-logo{
    color:#c48cff;
    font-size:24px;
    font-weight:bold;
}

.close-btn{
    background:none;
    border:none;
    color:white;
    font-size:24px;
    cursor:pointer;
}
.drawer.open{
    right:0;
}

.drawer a{
    display:block;
    color:white;
    text-decoration:none;
    padding:15px 0;
    border-bottom:1px solid #272737;
}

/* HERO */

.hero{
    min-height:auto;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
    padding:90px 20px 30px;
}
.hero-body{

    display:flex;
    flex-direction:row-reverse;
    align-items:center;

    justify-content:center;

    gap:310px;

    margin-top:20px;

}
.hero h1{
    font-size:52px;
    background:linear-gradient(90deg,#ffffff,#c48cff);

    -webkit-background-clip:text;
    background-clip:text;

    -webkit-text-fill-color:transparent;
}

.subtitle{
    margin-top:10px;
    color:#c48cff;
    font-size:20px;
}

.hero-features{
    margin-top:10px;
}

.feature-item{
    font-size:28px;
    margin:10px 0;
    opacity:0;
    transform:translateY(20px);
    animation:fadeUp .8s ease forwards;
}

.feature-item:nth-child(1){
    animation-delay:.3s;
}

.feature-item:nth-child(2){
    animation-delay:.8s;
}

.feature-item:nth-child(3){
    animation-delay:1.3s;
}
.feature-item:nth-child(4){
    animation-delay:1.8s;
}
.feature-item:nth-child(5){
    animation-delay:2.3s;
}

@keyframes fadeUp{
    from{
        opacity:0;
        transform:translateY(20px);
    }

    to{
        opacity:1;
        transform:translateY(0);
    }
}



.categories{

    display:flex;

    flex-direction:column;

    gap:12px;

    width:400px;

    margin-right:auto;
 
    margin-left:80px;

    font-size:20px;
    
}

.row{

    display:flex;

    flex-direction:row;

    align-items:center;

    justify-content:flex-start;

    gap:12px;

    width:100%;

}

.row .category{

    flex:1;

}

.row .count{

    flex:0 0 70px;

    width:70px;

    display:flex;

    align-items:center;

    justify-content:center;

    color:#c48cff;

    font-size:22px;

    font-weight:700;

}
.category{
    position:relative;

    background:#222436;

    border:1px solid rgba(196,140,255,.28);

    border-radius:24px;

    padding:30px 20px;

    text-align:center;

    cursor:pointer;

    transition:.25s ease;

    overflow:hidden;
}
.category::after{
    content:"";

    position:absolute;

    inset:0;

    background:linear-gradient(
        90deg,
        rgba(196,140,255,0),
        rgba(196,140,255,.08),
        rgba(196,140,255,0)
    );

    opacity:0;

    transition:.3s;
}
.category:hover{

    transform:translateY(-3px);

    border-color:#c48cff;

    box-shadow:
        0 0 20px rgba(196,140,255,.18);

}

.category:hover::after{

    opacity:1;

}
.category:active{

    transform:scale(.98);

}


.footer{
    text-align:center;
    padding:60px 20px;
    color:#888;
}
/* TOOLS */

.tools{

    display:flex;

    flex-direction:column;

    justify-content:flex-start;

    align-items:flex-start;

    gap:12px;

    width:420px;

    margin-top:0px;

    margin-left:0;

    margin-right:auto;

}

.tool{

    width:200px;

    padding:14px 16px;

    background:#222436;

    border:1px solid rgba(196,140,255,.28);

    border-radius:16px;

    text-align:center;

    cursor:pointer;

    transition:.25s;

}

.tool:hover{

    border-color:#c48cff;

    transform:translateY(-2px);

}
.hero-action{

    margin-top:0px;

    display:flex;

    justify-content:center;
    margin-left:auto;
 
    margin-right:400px;
}

.cta-btn{

    min-width:360px;

    padding:18px 32px;

    border:none;

    border-radius:18px;

    background:linear-gradient(135deg,#b57cff,#8d5cff);

    color:#fff;

    font-size:20px;

    font-weight:700;

    cursor:pointer;

    transition:.25s ease;

    box-shadow:0 12px 28px rgba(141,92,255,.28);

}

.cta-btn:hover{

    transform:translateY(-3px);

    box-shadow:0 18px 40px rgba(141,92,255,.45);

}
</style>
</head>

<body>

<header class="header">

<button class="menu-btn" onclick="toggleMenu()">☰</button>

<div class="logo">Nexora</div>

</header>
<div class="overlay" id="overlay" onclick="closeMenu()"></div>
<div class="drawer" id="drawer">
<div class="drawer-header">

    <div class="drawer-logo">
        Nexora
    </div>

    <button class="close-btn" onclick="closeMenu()">
        ✕
    </button>

</div>
<a href="#">🏠 ראשי</a>

<a href="#">🚀 פתרונות Nexora</a>

<a href="#">⚖️ תחומי פעילות</a>

<a href="#">ℹ️ אודות</a>

<a href="#">📞 צור קשר</a>

</div>

<section class="hero">

    <h1>ברוך הבא למשרד שלך</h1>

    <div class="subtitle">
        מערכת ניהול חכמה לעסק שלך
    </div>

    <div class="hero-body">

        <div class="categories">

            <div class="row">
                <div class="category">פניות חדשות</div>
                <div class="category count"  id="leads-count">2</div>
            </div>

            <div class="row">
                <div class="category">מסמכים שהתקבלו</div>
                <div class="category count" id="docs-count">4</div>
            </div>

            <div class="row">
                <div class="category">פגישות להיום</div>
                <div class="category count">1</div>
            </div>

            <div class="row">
                <div class="category">משימות פתוחות</div>
                <div class="category count">3</div>
            </div>

        </div>

        <div class="hero-features">

            <div class="feature-item">
                כך נראה משרד שבו כל הפניות
            </div>

            <div class="feature-item">
                 כל המסמכים
            </div>

            <div class="feature-item">
                 הפגישות
            </div>
            <div class="feature-item">
                 המשימות
            </div>
            <div class="feature-item">
                מרוכזים במקום אחד
            </div>
        </div>

    </div>
<div class="hero-action">

    <button class="cta-btn">

       נסדר הכל בהתאם לעסק שלכם

    </button>

</div>
    <div class="tools">

    <div class="tool">
        👥 מאגר לקוחות
    </div>

    <div class="tool">
        🖼️ גלריה
    </div>

    <div class="tool">
        📅 יומן
    </div>

</div>


</section>

<footer class="footer">

💜 Nexora

</footer>

<script>

const drawer =
document.getElementById("drawer");

const overlay =
document.getElementById("overlay");

function toggleMenu(){

    drawer.classList.toggle("open");
    overlay.classList.toggle("show");

}

function closeMenu(){

    drawer.classList.remove("open");
    overlay.classList.remove("show");

}
setTimeout(() => {

    const leads = document.getElementById("leads-count");

    leads.textContent = parseInt(leads.textContent, 10) + 1;

}, 7000);

setTimeout(() => {

    const leads = document.getElementById("docs-count");

    leads.textContent = parseInt(leads.textContent, 10) + 2;

}, 17000);

</script>

</body>
</html>
